<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piano Vertu — Espace client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0eee9;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(13,31,60,0.10);
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }
    .logo-wrap img { height: 44px; }
    .logo-wrap span {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #c9a84c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #0d1f3c;
      margin-bottom: 24px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #0d1f3c;
      background: #f9f8f6;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #c9a84c; background: #fff; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #0d1f3c;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: #162f5a; }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .err {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 14px;
      display: none;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #6b7280;
    }
    .register-link a { color: #c9a84c; text-decoration: none; font-weight: 500; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/img/logo.png" alt="Piano Vertu">
      <span>Espace client</span>
    </div>
    <h1>Connexion</h1>

    <div>
      <label for="username">Courriel</label>
      <input id="username" type="email" autocomplete="username" placeholder="votre@courriel.com">

      <label for="password">Mot de passe</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">

      <button class="btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
      <div class="err" id="errMsg"></div>
    </div>

    <div class="register-link">
      Pas encore de compte ? <a href="/index.html">Enregistrer un piano</a>
    </div>
  </div>

  <script>
    // ── Translations ──────────────────────────────────────────
    const LC = {
      fr: {
        subtitle: 'Espace client', heading: 'Connexion',
        lEmail: 'Courriel', lPwd: 'Mot de passe',
        btnLogin: 'Se connecter', btnLogging: 'Connexion…',
        registerLink: 'Pas encore de compte\u00a0? <a href="/index.html">Enregistrer un piano</a>',
        errFields: 'Veuillez saisir vos identifiants.',
        errCreds: 'Identifiants incorrects.',
        errNetwork: 'Erreur de connexion. Veuillez réessayer.',
      },
      en: {
        subtitle: 'Client Portal', heading: 'Sign in',
        lEmail: 'Email', lPwd: 'Password',
        btnLogin: 'Sign in', btnLogging: 'Signing in…',
        registerLink: 'No account yet? <a href="/index.html">Register a piano</a>',
        errFields: 'Please enter your credentials.',
        errCreds: 'Incorrect credentials.',
        errNetwork: 'Connection error. Please try again.',
      },
      zh: {
        subtitle: '客户空间', heading: '登录',
        lEmail: '电子邮箱', lPwd: '密码',
        btnLogin: '登录', btnLogging: '登录中…',
        registerLink: '还没有账户？<a href="/index.html">注册钢琴</a>',
        errFields: '请输入您的登录信息。',
        errCreds: '用户名或密码错误。',
        errNetwork: '连接错误，请重试。',
      },
    };

    const savedLang = localStorage.getItem('pv_lang') || 'fr';
    const lc = LC[savedLang] || LC.fr;
    document.querySelector('.logo-wrap span').textContent  = lc.subtitle;
    document.querySelector('h1').textContent               = lc.heading;
    document.querySelector('label[for="username"]').textContent = lc.lEmail;
    document.querySelector('label[for="password"]').textContent = lc.lPwd;
    document.getElementById('loginBtn').textContent        = lc.btnLogin;
    document.querySelector('.register-link').innerHTML     = lc.registerLink;

    // Redirect if already logged in
    const existing = localStorage.getItem('pv_token');
    const role     = localStorage.getItem('pv_role');
    if (existing && role === 'customer') window.location.replace('/dashboard-client.html');
    else if (existing && role) window.location.replace('/dashboard-staff.html');

    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:7072' : '';

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      err.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        err.textContent = lc.errFields;
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>${lc.btnLogging}`;

      try {
        const res = await fetch(`${API_BASE}/api/Login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || lc.errCreds;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = lc.btnLogin;
          return;
        }

        localStorage.setItem('pv_token',     data.token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_full_name', data.full_name);

        window.location.replace(data.role === 'customer' ? '/dashboard-client.html' : '/dashboard-staff.html');
      } catch {
        err.textContent = lc.errNetwork;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = lc.btnLogin;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
