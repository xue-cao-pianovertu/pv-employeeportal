<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piano Vertu — Connexion Personnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d1f3c;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }
    .logo-wrap img { height: 44px; }
    .logo-wrap span {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #c9a84c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #0d1f3c;
      margin-bottom: 24px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #0d1f3c;
      background: #f9f8f6;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #c9a84c; background: #fff; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #0d1f3c;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: #162f5a; }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .err {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 14px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/img/logo.png" alt="Piano Vertu">
      <span>Personnel</span>
    </div>
    <h1>Connexion</h1>

    <div>
      <label for="username">Identifiant</label>
      <input id="username" type="text" autocomplete="username" placeholder="nom.prénom">

      <label for="password">Mot de passe</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">

      <button class="btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
      <div class="err" id="errMsg"></div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const existing = localStorage.getItem('pv_token');
    if (existing) window.location.replace('/dashboard-staff.html');

    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:7072' : '';

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      err.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        err.textContent = 'Veuillez saisir vos identifiants.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connexion…';

      try {
        const res = await fetch(`${API_BASE}/api/Login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || 'Identifiants incorrects.';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          return;
        }

        localStorage.setItem('pv_token',     data.token);
        localStorage.setItem('pv_role',      data.role);
        localStorage.setItem('pv_full_name', data.full_name);

        window.location.replace('/dashboard-staff.html');
      } catch {
        err.textContent = 'Erreur de connexion. Veuillez réessayer.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
