<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piano Vertu — Espace client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0eee9;
      color: #0d1f3c;
      min-height: 100svh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #0d1f3c;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hd-left  { display: flex; align-items: center; gap: 12px; }
    .hd-right { display: flex; align-items: center; gap: 10px; }
    header img { height: 30px; }
    .hd-title {
      font-family: 'Playfair Display', serif;
      color: #c9a84c;
      font-size: 14px;
      letter-spacing: 0.06em;
    }
    .user-badge { font-size: 13px; color: rgba(255,255,255,0.65); }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.45);
      color: #c9a84c;
      border-radius: 6px;
      padding: 4px 11px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(201,168,76,0.1); }
    .btn-chgpwd {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.75);
      border-radius: 6px;
      padding: 4px 11px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .btn-chgpwd:hover { background: rgba(255,255,255,0.08); }

    /* ── Password change drawer ──────────────────────────────── */
    .pwd-drawer {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 20px;
      display: none;
    }
    .pwd-drawer.open { display: block; }
    .pwd-drawer h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #0d1f3c; }
    .pwd-field { margin-bottom: 10px; }
    .pwd-field label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .pwd-field input {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    }
    .pwd-msg { font-size: 13px; margin-top: 8px; min-height: 18px; }
    .pwd-msg.ok  { color: #16a34a; }
    .pwd-msg.err { color: #dc2626; }
    .btn-savepwd {
      background: #0d1f3c; color: #fff; border: none; border-radius: 7px;
      padding: 8px 18px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; margin-top: 4px;
    }
    .btn-savepwd:disabled { opacity: 0.6; cursor: default; }

    /* ── Page content ────────────────────────────────────────── */
    .page-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #0d1f3c;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    /* ── Registration cards ──────────────────────────────────── */
    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(13,31,60,0.07);
      padding: 16px 18px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
      border: 1.5px solid transparent;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(13,31,60,0.12);
      transform: translateY(-1px);
      border-color: rgba(201,168,76,0.3);
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-ref {
      font-family: monospace;
      font-size: 13px;
      font-weight: 600;
      color: #c9a84c;
    }
    .card-date {
      font-size: 12px;
      color: #9ca3af;
    }
    .card-piano {
      font-size: 15px;
      font-weight: 500;
      color: #0d1f3c;
      margin-bottom: 4px;
    }
    .card-cat {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-addr {
      font-size: 12px;
      color: #6b7280;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: #9ca3af;
      font-size: 14px;
    }
    .empty-state strong {
      display: block;
      font-size: 16px;
      color: #374151;
      margin-bottom: 8px;
    }

    /* ── Detail Panel ────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,31,60,0.35);
      z-index: 200;
    }
    .overlay.open { display: block; }
    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(520px, 100vw);
      background: #fff;
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.open { transform: translateX(0); }
    .panel-header {
      background: #0d1f3c;
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: #c9a84c;
    }
    .panel-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
    }
    .panel-close:hover { color: #fff; }
    .panel-body {
      overflow-y: auto;
      flex: 1;
      padding: 20px 18px;
    }
    .panel-section { margin-bottom: 22px; }
    .panel-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid #f3f4f6;
    }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
    }
    .field-item { display: flex; flex-direction: column; gap: 2px; }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .field-value { font-size: 13px; color: #111827; }
    .field-value.mono { font-family: monospace; font-size: 13px; }
    .field-full { grid-column: 1 / -1; }

    /* ── Loading spinner ─────────────────────────────────────── */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 64px 0;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-sm {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <header>
    <div class="hd-left">
      <img src="/img/logo.png" alt="Piano Vertu">
      <span class="hd-title">Espace client</span>
    </div>
    <div class="hd-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-chgpwd" onclick="togglePwdDrawer()">Changer le mot de passe</button>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="page-inner">
    <div class="page-title">Mes enregistrements</div>
    <div class="page-sub" id="pageSub">Chargement…</div>

    <div class="pwd-drawer" id="pwdDrawer">
      <h3>Changer le mot de passe</h3>
      <div class="pwd-field">
        <label for="pwdCurrent">Mot de passe actuel</label>
        <input type="password" id="pwdCurrent" autocomplete="current-password">
      </div>
      <div class="pwd-field">
        <label for="pwdNew">Nouveau mot de passe</label>
        <input type="password" id="pwdNew" autocomplete="new-password">
      </div>
      <div class="pwd-field">
        <label for="pwdConfirm">Confirmer le nouveau mot de passe</label>
        <input type="password" id="pwdConfirm" autocomplete="new-password">
      </div>
      <div class="pwd-msg" id="pwdMsg"></div>
      <button class="btn-savepwd" id="pwdBtn" onclick="submitPwdChange()">Enregistrer</button>
    </div>

    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Detail panel overlay -->
  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <h2 id="panelRef">—</h2>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>

  <script>
    // ── Translations ──────────────────────────────────────────
    const DC = {
      fr: {
        title: 'Espace client', pageTitle: 'Mes enregistrements', loading: 'Chargement…',
        changePwd: 'Changer le mot de passe', logout: 'Déconnexion',
        nReg: n => `${n} enregistrement${n !== 1 ? 's' : ''}`,
        noReg: 'Aucun enregistrement', noRegSub: 'Vos enregistrements de piano apparaîtront ici.',
        errLoad: 'Erreur de chargement', errLoadSub: 'Veuillez réessayer plus tard.',
        yes: 'Oui', no: 'Non', asap: 'Dès que possible',
        sReg: 'Enregistrement', sClient: 'Client', sLivraison: 'Livraison', sPiano: 'Piano',
        fRef: 'Référence', fDate: "Date d'enregistrement", fLang: 'Langue',
        fNom: 'Nom', fEmail: 'Courriel', fTel: 'Téléphone', fTel2: 'Téléphone 2',
        fAddr: 'Adresse', f40km: 'Dans 40 km', fFloor: 'Étage', fElev: 'Ascenseur',
        fStepsOut: 'Marches ext.', fStepsIn: 'Marches int.', fTurns: 'Virages escalier',
        fCrane: 'Grue requise', fDelivery: 'Livraison', fCollect: 'Collecte ancien piano',
        fCollectDesc: 'Marque ancien piano', fRecycle: 'Recyclage',
        fDelivNotes: 'Notes livraison', fMoverNotes: 'Notes déménageur',
        fCat: 'Catégorie', fCatModel: 'Modèle catalogue', fMake: 'Marque',
        fModel: 'Modèle', fSerial: 'N° de série', fColor: 'Couleur / Fini',
        fPurchase: "Date d'achat", fBench: 'Banc', fAccessories: 'Autres accessoires',
        fPianoNotes: 'Notes piano',
        humNote: `Le piano acoustique doit être gardé en tout temps à un taux d'humidité entre <b style="color:#92400e">40 % et 55 %</b> et une température entre <b style="color:#92400e">18 °C et 26 °C</b>. En cas contraire, la garantie pourrait être annulée.`,
        noWarrantyNote: `Ce piano est en consignation — aucune garantie n'est incluse.`,
        pwdTitle: 'Changer le mot de passe', pwdCurrent: 'Mot de passe actuel',
        pwdNew: 'Nouveau mot de passe', pwdConfirm: 'Confirmer le nouveau mot de passe',
        pwdSave: 'Enregistrer', pwdSaving: 'Enregistrement…',
        pwdErrRequired: 'Tous les champs sont requis.',
        pwdErrMatch: 'Les mots de passe ne correspondent pas.',
        pwdErrLength: 'Le nouveau mot de passe doit contenir au moins 6 caractères.',
        pwdSuccess: 'Mot de passe modifié avec succès.',
        pwdErrServer: 'Erreur lors du changement.',
        pwdErrNetwork: 'Erreur réseau. Veuillez réessayer.',
      },
      en: {
        title: 'Client Portal', pageTitle: 'My registrations', loading: 'Loading…',
        changePwd: 'Change password', logout: 'Sign out',
        nReg: n => `${n} registration${n !== 1 ? 's' : ''}`,
        noReg: 'No registrations', noRegSub: 'Your piano registrations will appear here.',
        errLoad: 'Loading error', errLoadSub: 'Please try again later.',
        yes: 'Yes', no: 'No', asap: 'As soon as possible',
        sReg: 'Registration', sClient: 'Customer', sLivraison: 'Delivery', sPiano: 'Piano',
        fRef: 'Reference', fDate: 'Registration date', fLang: 'Language',
        fNom: 'Name', fEmail: 'Email', fTel: 'Phone', fTel2: 'Phone 2',
        fAddr: 'Address', f40km: 'Within 40 km', fFloor: 'Floor', fElev: 'Elevator',
        fStepsOut: 'Steps outside', fStepsIn: 'Steps inside', fTurns: 'Stair turns',
        fCrane: 'Crane required', fDelivery: 'Delivery', fCollect: 'Collect old piano',
        fCollectDesc: 'Old piano brand', fRecycle: 'Recycling',
        fDelivNotes: 'Delivery notes', fMoverNotes: 'Mover notes',
        fCat: 'Category', fCatModel: 'Catalogue model', fMake: 'Brand',
        fModel: 'Model', fSerial: 'Serial no.', fColor: 'Colour / Finish',
        fPurchase: 'Purchase date', fBench: 'Bench', fAccessories: 'Other accessories',
        fPianoNotes: 'Piano notes',
        humNote: `The acoustic piano must be kept between <b style="color:#92400e">40% and 55% humidity</b> and <b style="color:#92400e">18°C and 26°C</b> at all times. Failure to do so may void the warranty.`,
        noWarrantyNote: `This piano is on consignment — no warranty is included.`,
        pwdTitle: 'Change password', pwdCurrent: 'Current password',
        pwdNew: 'New password', pwdConfirm: 'Confirm new password',
        pwdSave: 'Save', pwdSaving: 'Saving…',
        pwdErrRequired: 'All fields are required.',
        pwdErrMatch: 'Passwords do not match.',
        pwdErrLength: 'New password must be at least 6 characters.',
        pwdSuccess: 'Password changed successfully.',
        pwdErrServer: 'Error changing password.',
        pwdErrNetwork: 'Network error. Please try again.',
      },
      zh: {
        title: '客户空间', pageTitle: '我的注册', loading: '加载中…',
        changePwd: '修改密码', logout: '退出登录',
        nReg: n => `${n} 条注册`,
        noReg: '暂无注册记录', noRegSub: '您的钢琴注册记录将在此显示。',
        errLoad: '加载失败', errLoadSub: '请稍后重试。',
        yes: '是', no: '否', asap: '尽快',
        sReg: '注册', sClient: '客户', sLivraison: '送货', sPiano: '钢琴',
        fRef: '参考编号', fDate: '注册日期', fLang: '语言',
        fNom: '姓名', fEmail: '电子邮箱', fTel: '电话', fTel2: '电话 2',
        fAddr: '地址', f40km: '40公里范围内', fFloor: '楼层', fElev: '电梯',
        fStepsOut: '室外台阶', fStepsIn: '室内台阶', fTurns: '楼梯转弯',
        fCrane: '需要起重机', fDelivery: '送货', fCollect: '回收旧钢琴',
        fCollectDesc: '旧钢琴品牌', fRecycle: '回收处理',
        fDelivNotes: '送货备注', fMoverNotes: '搬运备注',
        fCat: '类别', fCatModel: '目录型号', fMake: '品牌',
        fModel: '型号', fSerial: '序列号', fColor: '颜色/饰面',
        fPurchase: '购买日期', fBench: '琴凳', fAccessories: '其他配件',
        fPianoNotes: '钢琴备注',
        humNote: `原声钢琴必须始终保持在 <b style="color:#92400e">40% 至 55% 湿度</b> 和 <b style="color:#92400e">18°C 至 26°C</b> 之间。否则可能导致保修失效。`,
        noWarrantyNote: `此钢琴为寄售钢琴——不含保修。`,
        pwdTitle: '修改密码', pwdCurrent: '当前密码',
        pwdNew: '新密码', pwdConfirm: '确认新密码',
        pwdSave: '保存', pwdSaving: '保存中…',
        pwdErrRequired: '所有字段均为必填。',
        pwdErrMatch: '两次密码不一致。',
        pwdErrLength: '新密码至少需要6个字符。',
        pwdSuccess: '密码修改成功。',
        pwdErrServer: '修改密码时出错。',
        pwdErrNetwork: '网络错误，请重试。',
      },
    };

    let lang = 'fr';
    const t = key => DC[lang]?.[key] ?? DC.fr[key];

    function dateLocale() {
      return lang === 'zh' ? 'zh-Hans-CN' : lang === 'en' ? 'en-CA' : 'fr-CA';
    }

    function applyDashboardLang() {
      document.documentElement.lang = lang === 'zh' ? 'zh-Hans' : lang;
      document.querySelector('.hd-title').textContent     = t('title');
      document.querySelector('.page-title').textContent   = t('pageTitle');
      document.querySelector('.btn-chgpwd').textContent   = t('changePwd');
      document.querySelector('.btn-logout').textContent   = t('logout');
      document.querySelector('#pwdDrawer h3').textContent = t('pwdTitle');
      document.querySelector('label[for="pwdCurrent"]').textContent = t('pwdCurrent');
      document.querySelector('label[for="pwdNew"]').textContent     = t('pwdNew');
      document.querySelector('label[for="pwdConfirm"]').textContent = t('pwdConfirm');
      const pwdBtn = document.getElementById('pwdBtn');
      if (pwdBtn && !pwdBtn.disabled) pwdBtn.textContent = t('pwdSave');
    }

    // ── Auth guard ────────────────────────────────────────────
    const token    = localStorage.getItem('pv_token');
    const role     = localStorage.getItem('pv_role');
    const fullName = localStorage.getItem('pv_full_name');

    if (!token || role !== 'customer') {
      window.location.replace('/login-client.html');
    }

    document.getElementById('userBadge').textContent = fullName || '';

    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:7072' : '';
    let allRows = [];

    function logout() {
      ['pv_token','pv_role','pv_full_name'].forEach(k => localStorage.removeItem(k));
      window.location.replace('/login-client.html');
    }

    // ── Load registrations ────────────────────────────────────
    async function loadRegistrations() {
      try {
        const res = await fetch(`${API_BASE}/api/GetMyRegistrations`, {
          headers: { 'Authorization': `Bearer ${token}`, 'X-Token': `Bearer ${token}` },
        });

        if (res.status === 401) {
          logout();
          return;
        }

        allRows = await res.json();
        lang = allRows[0]?.language || 'fr';
        localStorage.setItem('pv_lang', lang);
        applyDashboardLang();
        renderCards();
      } catch {
        document.getElementById('pageSub').textContent = '';
        document.getElementById('content').innerHTML =
          `<div class="empty-state"><strong>${t('errLoad')}</strong>${t('errLoadSub')}</div>`;
      }
    }

    // ── Render cards ──────────────────────────────────────────
    function renderCards() {
      const sub = document.getElementById('pageSub');
      sub.textContent = allRows.length ? t('nReg')(allRows.length) : '';

      const content = document.getElementById('content');

      if (allRows.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <strong>${t('noReg')}</strong>
            ${t('noRegSub')}
          </div>`;
        return;
      }

      content.innerHTML = `<div class="cards">${allRows.map(r => {
        const date  = r.created_at ? new Date(r.created_at + 'Z').toLocaleDateString(dateLocale()) : '—';
        const piano = [r.piano_make, r.piano_model].filter(Boolean).join(' ') || r[`type_name_${lang}`] || r.type_name_fr || '—';
        const cat   = r[`category_name_${lang}`] || r.category_name_fr || '—';
        const city  = [r.delivery_city, r.delivery_province].filter(Boolean).join(', ');

        return `
          <div class="card" onclick="openPanel(${r.id})">
            <div class="card-top">
              <span class="card-ref">${r.ref_id}</span>
              <span class="card-date">${date}</span>
            </div>
            <div class="card-piano">${piano}</div>
            <div class="card-cat">${cat}</div>
            <div class="card-footer">
              <span class="card-addr">${city || '—'}</span>
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    // ── Detail panel ──────────────────────────────────────────
    function openPanel(id) {
      const r = allRows.find(x => x.id === id);
      if (!r) return;
      document.getElementById('panelRef').textContent = r.ref_id;
      document.getElementById('panelBody').innerHTML  = buildPanelHTML(r);
      document.getElementById('overlay').classList.add('open');
      document.getElementById('panel').classList.add('open');
      if (r.signature_blob_name) loadSignature(r.id, r.signature_blob_name);
    }

    function closePanel() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('panel').classList.remove('open');
    }

    function fv(val, fallback = '—') {
      if (val === null || val === undefined || val === '') return fallback;
      if (val === true  || val === 1)  return t('yes');
      if (val === false || val === 0)  return t('no');
      if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}/))
        return new Date(val).toLocaleDateString(dateLocale());
      return val;
    }

    function buildPanelHTML(r) {
      const name        = `${r.customer_last_name || ''} ${r.customer_first_name || ''}`.trim();
      const delivAsap   = r.delivery_asap;
      const delivDate   = r.delivery_date ? new Date(r.delivery_date).toLocaleDateString(dateLocale()) : null;
      const catName     = r[`category_name_${lang}`] || r.category_name_fr;
      const typeName    = r[`type_name_${lang}`] || r.type_name_fr;

      return `
        <!-- ── ENREGISTREMENT ───────────────────────────────── -->
        <div class="panel-section">
          <div class="panel-section-title">${t('sReg')}</div>
          <div class="field-grid">
            <div class="field-item">
              <span class="field-label">${t('fRef')}</span>
              <span class="field-value mono" style="color:#c9a84c;font-weight:600">${r.ref_id}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fDate')}</span>
              <span class="field-value">${fv(r.created_at)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fLang')}</span>
              <span class="field-value">${r.language || '—'}</span>
            </div>
          </div>
        </div>

        <!-- ── CLIENT ──────────────────────────────────────── -->
        <div class="panel-section">
          <div class="panel-section-title">${t('sClient')}</div>
          <div class="field-grid">
            <div class="field-item field-full">
              <span class="field-label">${t('fNom')}</span>
              <span class="field-value">${name || '—'}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fEmail')}</span>
              <span class="field-value">${fv(r.customer_email)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fTel')}</span>
              <span class="field-value">${fv(r.customer_phone1)}</span>
            </div>
            ${r.customer_phone2 ? `
            <div class="field-item">
              <span class="field-label">${t('fTel2')}</span>
              <span class="field-value">${r.customer_phone2}</span>
            </div>` : ''}
          </div>
        </div>

        <!-- ── LIVRAISON ────────────────────────────────────── -->
        <div class="panel-section">
          <div class="panel-section-title">${t('sLivraison')}</div>
          <div class="field-grid">
            <div class="field-item field-full">
              <span class="field-label">${t('fAddr')}</span>
              <span class="field-value">${[r.delivery_street, r.delivery_apt ? '#'+r.delivery_apt : null, r.delivery_city, r.delivery_province, r.delivery_postal].filter(Boolean).join(', ') || '—'}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('f40km')}</span>
              <span class="field-value">${fv(r.within_40km)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fFloor')}</span>
              <span class="field-value">${fv(r.delivery_floor)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fElev')}</span>
              <span class="field-value">${fv(r.delivery_elevator)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fStepsOut')}</span>
              <span class="field-value">${r.steps_outside ?? '—'}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fStepsIn')}</span>
              <span class="field-value">${r.steps_inside ?? '—'}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fTurns')}</span>
              <span class="field-value">${r.stair_turns ?? '—'}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fCrane')}</span>
              <span class="field-value">${fv(r.crane_required)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fDelivery')}</span>
              <span class="field-value">${delivAsap ? t('asap') : (delivDate || '—')}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fCollect')}</span>
              <span class="field-value">${fv(r.collect_piano)}</span>
            </div>
            ${r.collect_piano && r.collect_desc ? `
            <div class="field-item">
              <span class="field-label">${t('fCollectDesc')}</span>
              <span class="field-value">${r.collect_desc}</span>
            </div>` : '<div class="field-item"></div>'}
            <div class="field-item">
              <span class="field-label">${t('fRecycle')}</span>
              <span class="field-value">${fv(r.recycle_piano)}</span>
            </div>
            ${r.delivery_notes ? `
            <div class="field-item field-full">
              <span class="field-label">${t('fDelivNotes')}</span>
              <span class="field-value">${r.delivery_notes}</span>
            </div>` : ''}
            ${r.mover_notes ? `
            <div class="field-item field-full">
              <span class="field-label">${t('fMoverNotes')}</span>
              <span class="field-value">${r.mover_notes}</span>
            </div>` : ''}
          </div>
        </div>

        <!-- ── PIANO ────────────────────────────────────────── -->
        <div class="panel-section">
          <div class="panel-section-title">${t('sPiano')}</div>
          <div class="field-grid">
            <div class="field-item">
              <span class="field-label">${t('fCat')}</span>
              <span class="field-value">${fv(catName)}</span>
            </div>
            ${typeName ? `
            <div class="field-item">
              <span class="field-label">${t('fCatModel')}</span>
              <span class="field-value">${typeName}</span>
            </div>` : '<div class="field-item"></div>'}
            <div class="field-item">
              <span class="field-label">${t('fMake')}</span>
              <span class="field-value">${fv(r.piano_make)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fModel')}</span>
              <span class="field-value">${fv(r.piano_model)}</span>
            </div>
            ${r.piano_serial ? `
            <div class="field-item">
              <span class="field-label">${t('fSerial')}</span>
              <span class="field-value mono">${r.piano_serial}</span>
            </div>` : ''}
            <div class="field-item">
              <span class="field-label">${t('fColor')}</span>
              <span class="field-value">${fv(r.piano_color)}</span>
            </div>
            <div class="field-item">
              <span class="field-label">${t('fPurchase')}</span>
              <span class="field-value">${fv(r.purchase_date)}</span>
            </div>
            ${r.bench_name ? `
            <div class="field-item">
              <span class="field-label">${t('fBench')}</span>
              <span class="field-value">${r.bench_name}</span>
            </div>` : ''}
            ${r.accessories ? `
            <div class="field-item field-full">
              <span class="field-label">${t('fAccessories')}</span>
              <span class="field-value">${r.accessories}</span>
            </div>` : ''}
            ${r.piano_notes ? `
            <div class="field-item field-full">
              <span class="field-label">${t('fPianoNotes')}</span>
              <span class="field-value">${r.piano_notes}</span>
            </div>` : ''}
          </div>
          ${r.humidity_confirmed && r.category_has_warranty ? `
          <div style="margin-top:10px;background:rgba(146,64,14,0.06);border:1px solid rgba(146,64,14,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:#78350f">
            ${t('humNote')}
          </div>` : ''}
        </div>

        <!-- ── DOCUMENTS & SIGNATURE ──────────────────────── -->
        <div class="panel-section">
          <div class="panel-section-title">Documents &amp; Signature</div>
          ${!r.category_has_warranty ? `
          <div style="background:rgba(100,116,139,0.08);border:1px solid rgba(100,116,139,0.2);border-radius:8px;padding:9px 12px;font-size:12px;color:#475569;margin-bottom:10px">
            ${t('noWarrantyNote')}
          </div>` : ''}
          <div class="field-grid">
            ${r.category_has_warranty ? `
            <div class="field-item">
              <span class="field-label">Garantie PDF</span>
              <span class="field-value">
                ${r.warranty_pdf_blob
                  ? `<button onclick="openClientPdf('${r.warranty_pdf_blob}', this)" style="background:none;border:none;color:#c9a84c;font-size:12px;cursor:pointer;padding:0;text-align:left;font-family:'DM Sans',sans-serif">↓ ${r.warranty_pdf_blob.split('/').pop()}</button>`
                  : '—'}
              </span>
            </div>
            ${r.tradeup_pdf_blob && r.category_has_tradeup && !['Fazioli','Bechstein','Bösendorfer','Schimmel','Shigeru Kawai','Blüthner','Mason & Hamlin','Estonia'].includes(r.type_brand) ? `
            <div class="field-item">
              <span class="field-label">Échange PDF</span>
              <span class="field-value">
                <button onclick="openClientPdf('${r.tradeup_pdf_blob}', this)" style="background:none;border:none;color:#c9a84c;font-size:12px;cursor:pointer;padding:0;text-align:left;font-family:'DM Sans',sans-serif">↓ ${r.tradeup_pdf_blob.split('/').pop()}</button>
              </span>
            </div>` : ''}` : ''}
            <div class="field-item">
              <span class="field-label">Signé le</span>
              <span class="field-value">${r.signed_at ? new Date(r.signed_at + 'Z').toLocaleString('fr-CA') : '—'}</span>
            </div>
            ${r.category_has_warranty ? `
            <div class="field-item">
              <span class="field-label">Humidité confirmée</span>
              <span class="field-value">${fv(r.humidity_confirmed)}</span>
            </div>` : ''}
          </div>
          ${r.signature_blob_name ? `
          <div style="margin-top:12px">
            <div class="field-label" style="margin-bottom:6px">Signature</div>
            <div id="sigBox-${r.id}" style="border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#fafafa;min-height:60px">
              <span style="font-size:12px;color:#9ca3af">Chargement…</span>
            </div>
          </div>` : (r.signature_type === 'typed' ? `
          <div style="margin-top:12px">
            <div class="field-label" style="margin-bottom:6px">Signature (tapée)</div>
            <div style="font-family:'Playfair Display',serif;font-size:20px;color:#0d1f3c;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa">${r.customer_first_name || ''} ${r.customer_last_name || ''}</div>
          </div>` : '')}
        </div>`;
    }

    // Fetch fresh SAS URL on click and open PDF in new tab
    async function openClientPdf(blobName, btn) {
      const orig = btn.textContent;
      btn.textContent = 'Chargement…';
      btn.disabled = true;
      try {
        const res  = await fetch(`${API_BASE}/api/GetPdfUrl?blob=${encodeURIComponent(blobName)}`);
        const data = await res.json();
        if (data.url) window.open(data.url, '_blank');
      } catch { /* ignore */ }
      btn.textContent = orig;
      btn.disabled = false;
    }

    // Load signature image after panel opens
    async function loadSignature(id, blobName) {
      const box = document.getElementById(`sigBox-${id}`);
      if (!box) return;
      try {
        const res  = await fetch(`${API_BASE}/api/GetSignatureUrl?blob=${encodeURIComponent(blobName)}`);
        const data = await res.json();
        if (data.url) {
          box.innerHTML = `<img src="${data.url}" alt="Signature" style="max-width:100%;max-height:120px;display:block">`;
        } else {
          box.innerHTML = '<span style="font-size:12px;color:#9ca3af">Non disponible</span>';
        }
      } catch {
        box.innerHTML = '<span style="font-size:12px;color:#9ca3af">Erreur de chargement</span>';
      }
    }

    // ── Password change ───────────────────────────────────────
    function togglePwdDrawer() {
      document.getElementById('pwdDrawer').classList.toggle('open');
    }

    async function submitPwdChange() {
      const current = document.getElementById('pwdCurrent').value;
      const newPwd  = document.getElementById('pwdNew').value;
      const confirm = document.getElementById('pwdConfirm').value;
      const msg     = document.getElementById('pwdMsg');
      const btn     = document.getElementById('pwdBtn');

      msg.className = 'pwd-msg';
      msg.textContent = '';

      if (!current || !newPwd || !confirm) {
        msg.className = 'pwd-msg err'; msg.textContent = t('pwdErrRequired'); return;
      }
      if (newPwd !== confirm) {
        msg.className = 'pwd-msg err'; msg.textContent = t('pwdErrMatch'); return;
      }
      if (newPwd.length < 6) {
        msg.className = 'pwd-msg err'; msg.textContent = t('pwdErrLength'); return;
      }

      btn.disabled = true;
      btn.textContent = t('pwdSaving');

      try {
        const res = await fetch(`${API_BASE}/api/ChangePassword`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'X-Token': `Bearer ${token}`,
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ current_password: current, new_password: newPwd })
        });
        const data = await res.json();
        if (res.ok) {
          msg.className = 'pwd-msg ok'; msg.textContent = t('pwdSuccess');
          document.getElementById('pwdCurrent').value = '';
          document.getElementById('pwdNew').value = '';
          document.getElementById('pwdConfirm').value = '';
        } else {
          msg.className = 'pwd-msg err'; msg.textContent = data.error || t('pwdErrServer');
        }
      } catch {
        msg.className = 'pwd-msg err'; msg.textContent = t('pwdErrNetwork');
      }
      btn.disabled = false;
      btn.textContent = t('pwdSave');
    }

    loadRegistrations();
  </script>
</body>
</html>
